<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <div class="container mx-auto px-6 py-10">
        <h1 class="text-4xl font-bold text-center mb-10 text-indigo-600">
            Available Events
        </h1>

        <div class="grid md:grid-cols-3 gap-8">
            {% for event in events %}
            <div class="bg-white shadow-lg rounded-2xl p-6 hover:shadow-2xl transition duration-300">
                
                <h2 class="text-2xl font-semibold text-gray-800 mb-2">
                    {{ event.title }}
                </h2>

                <p class="text-gray-600 mb-3">
                    {{ event.description }}
                </p>

                <div class="text-sm text-gray-500 space-y-1">
                    <p><strong>Date:</strong> {{ event.date }}</p>
                    <p><strong>Time:</strong> {{ event.time }}</p>
                    <p><strong>Location:</strong> {{ event.location }}</p>
                    <p><strong>Price:</strong> ₹{{ event.price }}</p>
                    <p><strong>Total Seats:</strong> {{ event.total_seats }}</p>
                </div>

                <a href="{% url 'book_event' event.id %}" 
   class="block text-center mt-4 w-full bg-indigo-600 text-white py-2 rounded-xl hover:bg-indigo-700">
    Book Now
</a>
            </div>
            {% empty %}
            <p>No events available.</p>
            {% endfor %}
        </div>
    </div>

</body>
</html>
